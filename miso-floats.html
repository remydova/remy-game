<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>float with miso~</title>
<meta name="description" content="a quiet place to drift with miso the tabby cat">
<meta name="theme-color" content="#0c0c18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="miso floats">
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0c0c18;overflow:hidden;touch-action:none}
body{display:flex;justify-content:center;align-items:center}
canvas{display:block;cursor:pointer}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ── PWA icon (canvas-generated) ───────────────────────────────────────────────
function makeMisoIcon(size) {
  const ic = document.createElement('canvas');
  ic.width = ic.height = size;
  const x = ic.getContext('2d');
  const s = size / 192;
  x.fillStyle = '#0c0c18';
  x.fillRect(0, 0, size, size);
  x.save();
  x.translate(size * 0.5, size * 0.46);
  x.scale(s * 3.0, s * 3.0);
  const hw = 22, hh = 16;
  x.fillStyle = '#d4956a';
  x.beginPath(); x.roundRect(-hw,-hh,hw*2,hh*2,9); x.fill();
  x.fillStyle = '#c07850';
  x.fillRect(-hw+7,-hh+1,3.5,hh*2-2); x.fillRect(-hw+15,-hh-1,3,hh*2+2); x.fillRect(-hw+24,-hh+2,3,hh*2-3);
  x.fillStyle = '#d4956a';
  x.beginPath(); x.moveTo(-hw+2,-hh+2); x.lineTo(-hw-4,-hh-13); x.lineTo(-hw+13,-hh+1); x.closePath(); x.fill();
  x.beginPath(); x.moveTo(-hw+20,-hh+1); x.lineTo(-hw+28,-hh-13); x.lineTo(-hw+35,-hh+2); x.closePath(); x.fill();
  x.fillStyle = '#e09080';
  x.beginPath(); x.moveTo(-hw+3,-hh+1); x.lineTo(-hw-1,-hh-9); x.lineTo(-hw+10,-hh+1); x.closePath(); x.fill();
  x.beginPath(); x.moveTo(-hw+21,-hh+0); x.lineTo(-hw+27,-hh-9); x.lineTo(-hw+33,-hh+1); x.closePath(); x.fill();
  x.fillStyle = '#1a1a2e';
  x.beginPath(); x.ellipse(-hw+10,-hh+12,3.5,4,0,0,Math.PI*2); x.fill();
  x.beginPath(); x.ellipse(-hw+25,-hh+12,3.5,4,0,0,Math.PI*2); x.fill();
  x.fillStyle = 'rgba(255,255,255,0.8)';
  x.beginPath(); x.arc(-hw+11.5,-hh+10,1.2,0,Math.PI*2); x.fill();
  x.beginPath(); x.arc(-hw+26.5,-hh+10,1.2,0,Math.PI*2); x.fill();
  x.fillStyle = '#d08070';
  x.beginPath(); x.moveTo(-hw+17.5,-hh+18); x.lineTo(-hw+14,-hh+15); x.lineTo(-hw+21,-hh+15); x.closePath(); x.fill();
  x.strokeStyle = '#d4956a'; x.lineWidth = 4.5; x.lineCap = 'round';
  x.beginPath(); x.moveTo(hw-4,hh-4); x.bezierCurveTo(hw+12,hh+10,hw+22,hh,hw+16,hh-20); x.stroke();
  x.restore();
  x.fillStyle = '#d4956a';
  x.font = `italic bold ${size*0.1}px Georgia,serif`;
  x.textAlign = 'center'; x.textBaseline = 'bottom';
  x.fillText('miso floats', size*0.5, size*0.97);
  return ic.toDataURL('image/png');
}

(function(){
  const apple = document.createElement('link');
  apple.rel = 'apple-touch-icon';
  apple.href = makeMisoIcon(180);
  document.head.appendChild(apple);
})();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// ── Canvas ────────────────────────────────────────────────────────────────────
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
const W = 400, H = 600;
let sc = 1;
function resize() {
  sc = Math.min(window.innerWidth/W, window.innerHeight/H);
  cv.width = Math.round(W*sc); cv.height = Math.round(H*sc);
}
resize();
window.addEventListener('resize', resize);

// ── Palette ───────────────────────────────────────────────────────────────────
const BG   = '#0c0c18';
const SURF = '#13131f';
const AMB  = '#d4956a';
const AMB2 = '#a06840';
const AMB3 = '#c07850';
const TEAL = '#7fb5a0';
const TEAL2= '#5a8c7a';
const LAV  = '#9b8bb4';
const LAV2 = '#7a6894';
const TEXT = '#e8ddd0';
const TEXTD= '#6a5d50';

// ── Audio ─────────────────────────────────────────────────────────────────────
let ac;
function tone(freq, dur, vol=0.08, type='sine') {
  try {
    if(!ac) ac = new (window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
    o.start(ac.currentTime); o.stop(ac.currentTime+dur);
  } catch(_){}
}

// Soft upward bob chime — single gentle note
const sfxBob = () => tone(528, 0.2, 0.032);

// Ambient lofi pad drone — C2/Eb2/G2 minor chord
let droneStarted = false;
function startDrone() {
  if(droneStarted) return;
  droneStarted = true;
  try {
    if(!ac) ac = new (window.AudioContext||window.webkitAudioContext)();
    const master = ac.createGain();
    master.gain.setValueAtTime(0, ac.currentTime);
    master.gain.linearRampToValueAtTime(1, ac.currentTime+6);
    master.connect(ac.destination);
    [[65.4,0.011],[82.4,0.009],[98.0,0.008]].forEach(([f,v])=>{
      const o=ac.createOscillator(), g=ac.createGain();
      o.type='sine'; o.frequency.value=f; g.gain.value=v;
      o.connect(g); g.connect(master); o.start();
    });
  } catch(_){}
}

// ── Parallax cloud layers ─────────────────────────────────────────────────────
const CLOUDS_S = Array.from({length:7}, ()=>({
  x:Math.random()*W, y:Math.random()*H,
  r:50+Math.random()*70, op:Math.random()*0.06+0.025, spd:0.10+Math.random()*0.06,
}));
const CLOUDS_F = Array.from({length:11}, ()=>({
  x:Math.random()*W, y:Math.random()*H,
  r:18+Math.random()*32, op:Math.random()*0.05+0.018, spd:0.22+Math.random()*0.12,
}));

// ── Stars ─────────────────────────────────────────────────────────────────────
const STARS = Array.from({length:72}, ()=>({
  x:Math.random()*W, y:Math.random()*H,
  r:Math.random()*1.4+0.3,
  ph:Math.random()*Math.PI*2,
  sp:Math.random()*0.022+0.008,
}));

// ── Rain streaks ──────────────────────────────────────────────────────────────
const RAIN = Array.from({length:48}, ()=>({
  x:Math.random()*W, y:Math.random()*H,
  len:Math.random()*16+6,
  spd:Math.random()*1.4+0.7,
  op:Math.random()*0.16+0.04,
}));

// ── Floating scenery — books ──────────────────────────────────────────────────
const BCOLORS = [TEAL,TEAL2,LAV,LAV2,'#6a8c7c','#8a7ab2','#5e8875'];

function makeSceneryBook() {
  const n = 1+Math.floor(Math.random()*3); // 1-3 books stacked
  return {
    x: W+30,
    y: 50+Math.random()*(H-100),
    spd: 0.28+Math.random()*0.5,
    op: 0.32+Math.random()*0.52,
    books: Array.from({length:n}, ()=>({
      w: 36+Math.floor(Math.random()*20),
      h: 16+Math.floor(Math.random()*22),
      color: BCOLORS[Math.floor(Math.random()*BCOLORS.length)],
      rot: (Math.random()-0.5)*0.12,
    })),
  };
}

let sceneryBooks = [], bookTimer = 0, nextBookIn = 80;

// ── Floating scenery — drifters (notes, tiny stars, flowers) ─────────────────
const NOTE_CHARS = ['♩','♪','♫','♬'];

function makeDrifter(scattered) {
  const type = ['note','flower','star'][Math.floor(Math.random()*3)];
  return {
    type,
    char: type==='note' ? NOTE_CHARS[Math.floor(Math.random()*4)] : '',
    x: scattered ? Math.random()*W : W+20,
    y: 20+Math.random()*(H-40),
    spd: 0.10+Math.random()*0.38,
    op: 0.07+Math.random()*0.20,
    sz: 0.5+Math.random()*1.1,
    rot: Math.random()*Math.PI*2,
    rotSpd: (Math.random()-0.5)*0.007,
    bobPh: Math.random()*Math.PI*2,
    bobSpd: 0.008+Math.random()*0.012,
    bobAmp: 3+Math.random()*9,
  };
}

// Start scattered so screen isn't empty at launch
const DRIFTERS = Array.from({length:20}, ()=>makeDrifter(true));

// ── Miso spring-float physics ─────────────────────────────────────────────────
const CAT = {
  x:100, y:H/2, vy:0, angle:0, w:44, h:32,
  bob() {
    this.vy = -3.6;
    sfxBob();
  },
  update() {
    const spring = (H/2 - this.y) * 0.006; // gentle pull toward center
    this.vy = (this.vy + spring) * 0.96;    // soft damping
    this.y += this.vy;
    this.angle = Math.max(-0.28, Math.min(0.28, this.vy*0.055));
  },
};

// ── State ─────────────────────────────────────────────────────────────────────
let mode = 'idle'; // idle | floating
let tick = 0;

// ── Draw: background ──────────────────────────────────────────────────────────
function drawBg() {
  cx.fillStyle = BG; cx.fillRect(0,0,W,H);
  const g = cx.createRadialGradient(W/2,0,0,W/2,0,H*0.55);
  g.addColorStop(0,'rgba(155,139,180,0.05)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=g; cx.fillRect(0,0,W,H);
}

function drawStars() {
  STARS.forEach(s=>{
    s.ph+=s.sp;
    const a=(0.2+Math.sin(s.ph)*0.22).toFixed(2);
    cx.fillStyle=`rgba(232,221,208,${a})`;
    cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2); cx.fill();
  });
}

function drawRain(moving) {
  RAIN.forEach(r=>{
    if(moving){
      r.x-=r.spd*0.38; r.y+=r.spd*2.3;
      if(r.y>H+r.len){ r.y=-r.len; r.x=Math.random()*W; }
      if(r.x<-4)     { r.x=W+4;   r.y=Math.random()*H; }
    }
    cx.strokeStyle=`rgba(127,181,160,${r.op})`;
    cx.lineWidth=0.75;
    cx.beginPath(); cx.moveTo(r.x,r.y); cx.lineTo(r.x-r.len*0.24,r.y+r.len); cx.stroke();
  });
}

function drawParallax(moving) {
  CLOUDS_S.forEach(c=>{
    if(moving){ c.x-=c.spd; if(c.x+c.r<0){ c.x=W+c.r; c.y=Math.random()*H; } }
    const g=cx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.r);
    g.addColorStop(0,`rgba(155,139,180,${c.op})`); g.addColorStop(1,'rgba(12,12,24,0)');
    cx.fillStyle=g; cx.beginPath(); cx.arc(c.x,c.y,c.r,0,Math.PI*2); cx.fill();
  });
  CLOUDS_F.forEach(c=>{
    if(moving){ c.x-=c.spd; if(c.x+c.r<0){ c.x=W+c.r; c.y=Math.random()*H; } }
    const g=cx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.r);
    g.addColorStop(0,`rgba(127,181,160,${c.op})`); g.addColorStop(1,'rgba(12,12,24,0)');
    cx.fillStyle=g; cx.beginPath(); cx.arc(c.x,c.y,c.r,0,Math.PI*2); cx.fill();
  });
}

// ── Draw: rounded rect helper ─────────────────────────────────────────────────
function rr(x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y);
  cx.lineTo(x+w-r,y); cx.arcTo(x+w,y,   x+w,y+r,  r);
  cx.lineTo(x+w,y+h-r); cx.arcTo(x+w,y+h,x+w-r,y+h,r);
  cx.lineTo(x+r,y+h); cx.arcTo(x,y+h,  x,y+h-r, r);
  cx.lineTo(x,y+r); cx.arcTo(x,y,    x+r,y,   r);
  cx.closePath();
}

// ── Draw: single book ─────────────────────────────────────────────────────────
function drawBook(bx,by,bw,bh,color,rot) {
  cx.save();
  cx.translate(bx+bw/2, by+bh/2); cx.rotate(rot||0);
  cx.fillStyle=color; cx.fillRect(-bw/2,-bh/2,bw,bh);
  cx.fillStyle='rgba(0,0,0,0.22)'; cx.fillRect(-bw/2,-bh/2,7,bh);
  cx.fillStyle='rgba(255,255,255,0.07)'; cx.fillRect(-bw/2+1,-bh/2,1,bh);
  cx.fillStyle='rgba(232,221,208,0.13)'; cx.fillRect(bw/2-4,-bh/2+1,3,bh-2);
  cx.fillStyle='rgba(255,255,255,0.11)'; cx.fillRect(-bw/2+10,-bh/2+5,bw-16,1.5);
  if(bh>24) cx.fillRect(-bw/2+10,-bh/2+11,bw-22,1);
  cx.strokeStyle='rgba(0,0,0,0.12)'; cx.lineWidth=0.6;
  cx.strokeRect(-bw/2,-bh/2,bw,bh);
  cx.restore();
}

// ── Draw: scenery book cluster ────────────────────────────────────────────────
function drawSceneryBooks(sb) {
  cx.save();
  cx.globalAlpha = sb.op;
  const totalH = sb.books.reduce((s,bk)=>s+bk.h+1,0)-1;
  let ty = sb.y - totalH/2;
  for(const bk of sb.books){
    drawBook(sb.x - bk.w/2, ty, bk.w, bk.h, bk.color, bk.rot);
    ty += bk.h+1;
  }
  cx.restore();
}

// ── Draw: drifting elements (notes, tiny stars, flowers) ─────────────────────
function drawDrifter(d) {
  d.bobPh += d.bobSpd;
  d.rot   += d.rotSpd;
  const dy = Math.sin(d.bobPh)*d.bobAmp;
  cx.save();
  cx.globalAlpha = d.op;
  cx.translate(d.x, d.y+dy);
  cx.rotate(d.rot);

  if(d.type==='note'){
    cx.fillStyle=LAV;
    cx.font=`italic ${Math.round(13*d.sz)}px Georgia,serif`;
    cx.textAlign='center'; cx.textBaseline='middle';
    cx.fillText(d.char, 0, 0);
  } else if(d.type==='star'){
    const sr=3*d.sz;
    cx.fillStyle=TEXT;
    cx.beginPath(); cx.arc(0,0,sr*0.55,0,Math.PI*2); cx.fill();
    cx.fillStyle=`rgba(232,221,208,0.55)`;
    cx.fillRect(-0.6,-sr,1.2,sr*2); cx.fillRect(-sr,-0.6,sr*2,1.2);
  } else { // flower
    const r=3.2*d.sz, pr=1.6*d.sz;
    cx.fillStyle=TEXTD;
    for(let i=0;i<5;i++){
      const a=(i/5)*Math.PI*2;
      cx.beginPath(); cx.arc(Math.cos(a)*r,Math.sin(a)*r,pr,0,Math.PI*2); cx.fill();
    }
    cx.fillStyle=AMB;
    cx.beginPath(); cx.arc(0,0,pr*0.85,0,Math.PI*2); cx.fill();
  }
  cx.restore();
}

// ── Draw: Miso the tabby cat ──────────────────────────────────────────────────
function drawCat(x, y, angle) {
  cx.save();
  cx.translate(x,y);
  cx.rotate(angle);
  cx.scale(-1,1);
  const hw=CAT.w/2, hh=CAT.h/2;

  cx.fillStyle=AMB; rr(-hw,-hh,CAT.w,CAT.h,9); cx.fill();

  cx.save();
  rr(-hw,-hh,CAT.w,CAT.h,9); cx.clip();
  cx.fillStyle=AMB3;
  cx.fillRect(-hw+7,-hh+1,3.5,CAT.h-2); cx.fillRect(-hw+15,-hh-1,3,CAT.h+2); cx.fillRect(-hw+24,-hh+2,3,CAT.h-3);
  cx.fillStyle=AMB2;
  cx.fillRect(-hw+8,-hh+2,1.5,CAT.h-4); cx.fillRect(-hw+16,-hh,1.5,CAT.h);
  cx.restore();

  cx.fillStyle=AMB;
  cx.beginPath(); cx.moveTo(-hw+2,-hh+2); cx.lineTo(-hw-4,-hh-13); cx.lineTo(-hw+13,-hh+1); cx.closePath(); cx.fill();
  cx.beginPath(); cx.moveTo(-hw+20,-hh+1); cx.lineTo(-hw+28,-hh-13); cx.lineTo(-hw+35,-hh+2); cx.closePath(); cx.fill();
  cx.fillStyle='#e09080';
  cx.beginPath(); cx.moveTo(-hw+3,-hh+1); cx.lineTo(-hw-1,-hh-9); cx.lineTo(-hw+10,-hh+1); cx.closePath(); cx.fill();
  cx.beginPath(); cx.moveTo(-hw+21,-hh+0); cx.lineTo(-hw+27,-hh-9); cx.lineTo(-hw+33,-hh+1); cx.closePath(); cx.fill();

  cx.fillStyle='#1a1a2e';
  cx.beginPath(); cx.ellipse(-hw+10,-hh+12,3.5,4,0,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(-hw+25,-hh+12,3.5,4,0,0,Math.PI*2); cx.fill();
  cx.fillStyle='rgba(255,255,255,0.78)';
  cx.beginPath(); cx.arc(-hw+11.5,-hh+10,1.2,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(-hw+26.5,-hh+10,1.2,0,Math.PI*2); cx.fill();

  cx.fillStyle='#d08070';
  cx.beginPath(); cx.moveTo(-hw+17.5,-hh+18); cx.lineTo(-hw+14,-hh+15); cx.lineTo(-hw+21,-hh+15); cx.closePath(); cx.fill();

  cx.strokeStyle='rgba(160,100,80,0.55)'; cx.lineWidth=0.8;
  cx.beginPath(); cx.moveTo(-hw+17.5,-hh+18); cx.quadraticCurveTo(-hw+14,-hh+22,-hw+11,-hh+21); cx.stroke();
  cx.beginPath(); cx.moveTo(-hw+17.5,-hh+18); cx.quadraticCurveTo(-hw+21,-hh+22,-hw+24,-hh+21); cx.stroke();

  cx.strokeStyle='rgba(232,221,208,0.5)'; cx.lineWidth=0.9;
  cx.beginPath(); cx.moveTo(-hw+13,-hh+16); cx.lineTo(-hw-8,-hh+13); cx.stroke();
  cx.beginPath(); cx.moveTo(-hw+13,-hh+18); cx.lineTo(-hw-7,-hh+19); cx.stroke();
  cx.beginPath(); cx.moveTo(-hw+22,-hh+16); cx.lineTo(-hw+44,-hh+13); cx.stroke();
  cx.beginPath(); cx.moveTo(-hw+22,-hh+18); cx.lineTo(-hw+43,-hh+19); cx.stroke();

  cx.strokeStyle=AMB; cx.lineWidth=4.5; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(hw-4,hh-4); cx.bezierCurveTo(hw+12,hh+10,hw+22,hh,hw+16,hh-20); cx.stroke();
  cx.strokeStyle=AMB3; cx.lineWidth=2;
  cx.beginPath(); cx.moveTo(hw-3,hh-4); cx.bezierCurveTo(hw+10,hh+8,hw+20,hh,hw+14,hh-19); cx.stroke();

  cx.restore();
}

// ── Draw: title screen ────────────────────────────────────────────────────────
function drawIdle() {
  cx.textAlign='center'; cx.textBaseline='middle';

  cx.fillStyle=AMB;
  cx.font='italic bold 34px Georgia,serif';
  cx.fillText('float with miso~', W/2, H/2-72);

  cx.fillStyle=TEXTD;
  cx.font='14px Georgia,serif';
  cx.fillText('a quiet place to drift', W/2, H/2-38);

  const pulse=0.5+Math.sin(tick*0.045)*0.42;
  cx.globalAlpha=pulse;
  cx.fillStyle=TEAL;
  cx.font='italic 16px Georgia,serif';
  cx.fillText('tap  ·  or press space', W/2, H/2+32);
  cx.globalAlpha=1;

  cx.fillStyle='rgba(106,93,80,0.4)';
  cx.font='italic 11px Georgia,serif';
  cx.fillText("it's okay to be you.", W/2, H-22);
}

// ── Input ─────────────────────────────────────────────────────────────────────
function doBob() {
  if(mode==='idle'){ mode='floating'; startDrone(); }
  CAT.bob();
}

window.addEventListener('keydown', e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); doBob(); }
});
cv.addEventListener('pointerdown', e=>{ e.preventDefault(); doBob(); });

// ── Experience loop ───────────────────────────────────────────────────────────
function loop() {
  tick++;
  cx.setTransform(sc,0,0,sc,0,0);

  drawBg();
  drawParallax(mode==='floating');
  drawStars();
  drawRain(mode==='floating');

  // drifters always animate — give life even on title screen
  DRIFTERS.forEach(d=>{
    d.x -= d.spd;
    if(d.x < -20){ d.x=W+20; d.y=20+Math.random()*(H-40); }
  });

  if(mode==='floating'){
    CAT.update();

    // spawn scenery books at gentle intervals
    bookTimer++;
    if(bookTimer >= nextBookIn){
      sceneryBooks.push(makeSceneryBook());
      bookTimer = 0;
      nextBookIn = 70+Math.floor(Math.random()*110);
    }
    sceneryBooks.forEach(b=>{ b.x -= b.spd; });
    sceneryBooks = sceneryBooks.filter(b=>b.x > -80);
  } else {
    // idle: gentle pre-play bob
    CAT.y     = H/2+8+Math.sin(tick*0.032)*12;
    CAT.angle = Math.sin(tick*0.032)*0.07;
  }

  // draw scenery books behind Miso
  sceneryBooks.forEach(drawSceneryBooks);

  // draw drifters behind Miso
  DRIFTERS.forEach(drawDrifter);

  // draw Miso with continuous gentle sway
  const bobY = Math.sin(tick*0.07)*1.8;
  const bobA = Math.sin(tick*0.05)*0.025;
  drawCat(CAT.x, CAT.y+bobY, CAT.angle+bobA);

  // title overlay
  if(mode==='idle') drawIdle();

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
