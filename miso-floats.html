<body>
<canvas id="c"></canvas>
<script>
// ── PWA icon (canvas-generated, embedded as data URL) ────────────────────────
function makeMisoIcon(size) {
  const ic = document.createElement('canvas');
  ic.width = ic.height = size;
  const x = ic.getContext('2d');
  const s = size / 192; // scale factor relative to 192px design

  // full-bleed navy background — no rounded corners, maskable icons need edge-to-edge fill
  x.fillStyle = '#0c0c18';
  x.fillRect(0, 0, size, size);

  // center the cat — shifted up slightly to leave room for text below
  x.save();
  x.translate(size * 0.5, size * 0.46);
  x.scale(s * 3.0, s * 3.0);

  const hw = 22, hh = 16;

  // body
  x.fillStyle = '#d4956a';
  x.beginPath();
  x.roundRect(-hw, -hh, hw*2, hh*2, 9);
  x.fill();

  // stripes
  x.fillStyle = '#c07850';
  x.fillRect(-hw+7, -hh+1, 3.5, hh*2-2);
  x.fillRect(-hw+15, -hh-1, 3, hh*2+2);
  x.fillRect(-hw+24, -hh+2, 3, hh*2-3);

  // ears
  x.fillStyle = '#d4956a';
  x.beginPath(); x.moveTo(-hw+2,-hh+2); x.lineTo(-hw-4,-hh-13); x.lineTo(-hw+13,-hh+1); x.closePath(); x.fill();
  x.beginPath(); x.moveTo(-hw+20,-hh+1); x.lineTo(-hw+28,-hh-13); x.lineTo(-hw+35,-hh+2); x.closePath(); x.fill();
  x.fillStyle = '#e09080';
  x.beginPath(); x.moveTo(-hw+3,-hh+1); x.lineTo(-hw-1,-hh-9); x.lineTo(-hw+10,-hh+1); x.closePath(); x.fill();
  x.beginPath(); x.moveTo(-hw+21,-hh+0); x.lineTo(-hw+27,-hh-9); x.lineTo(-hw+33,-hh+1); x.closePath(); x.fill();

  // eyes
  x.fillStyle = '#1a1a2e';
  x.beginPath(); x.ellipse(-hw+10,-hh+12,3.5,4,0,0,Math.PI*2); x.fill();
  x.beginPath(); x.ellipse(-hw+25,-hh+12,3.5,4,0,0,Math.PI*2); x.fill();
  x.fillStyle = 'rgba(255,255,255,0.8)';
  x.beginPath(); x.arc(-hw+11.5,-hh+10,1.2,0,Math.PI*2); x.fill();
  x.beginPath(); x.arc(-hw+26.5,-hh+10,1.2,0,Math.PI*2); x.fill();

  // nose
  x.fillStyle = '#d08070';
  x.beginPath(); x.moveTo(-hw+17.5,-hh+18); x.lineTo(-hw+14,-hh+15); x.lineTo(-hw+21,-hh+15); x.closePath(); x.fill();

  // tail
  x.strokeStyle = '#d4956a'; x.lineWidth = 4.5; x.lineCap = 'round';
  x.beginPath();
  x.moveTo(hw-4,hh-4);
  x.bezierCurveTo(hw+12,hh+10, hw+22,hh, hw+16,hh-20);
  x.stroke();

  x.restore();

  // title text
  x.fillStyle = '#d4956a';
  x.font = `italic bold ${size * 0.1}px Georgia, serif`;
  x.textAlign = 'center';
  x.textBaseline = 'bottom';
  x.fillText('miso floats', size * 0.5, size * 0.97);

  return ic.toDataURL('image/png');
}

// ── Apple touch icon (canvas-generated for iOS) ───────────────────────────────
(function(){
  const apple = document.createElement('link');
  apple.rel = 'apple-touch-icon';
  apple.href = makeMisoIcon(180);
  document.head.appendChild(apple);
})();

// ── Service worker ────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// ── Canvas ────────────────────────────────────────────────────────────────────
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
const W = 400, H = 600;
let sc = 1;

function resize() {
  sc = Math.min(window.innerWidth / W, window.innerHeight / H);
  cv.width  = Math.round(W * sc);
  cv.height = Math.round(H * sc);
}
resize();
window.addEventListener('resize', resize);

// ── Palette ───────────────────────────────────────────────────────────────────
const BG    = '#0c0c18';
const SURF  = '#13131f';
const AMB   = '#d4956a';  // miso body
const AMB2  = '#a06840';  // dark stripe
const AMB3  = '#c07850';  // mid stripe
const TEAL  = '#7fb5a0';  // books
const TEAL2 = '#5a8c7a';  // book ledge / dark
const LAV   = '#9b8bb4';  // accent / lav books
const LAV2  = '#7a6894';
const TEXT  = '#e8ddd0';
const TEXTD = '#6a5d50';

// ── Audio (Web Audio API — gentle tones) ─────────────────────────────────────
let ac;
function tone(freq, dur, vol=0.09, type='sine') {
  try {
    if (!ac) ac = new (window.AudioContext||window.webkitAudioContext)();
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(ac.currentTime); o.stop(ac.currentTime + dur);
  } catch(_){}
}
const sfxFlap  = () => tone(420, 0.1, 0.06);
const sfxScore = () => { tone(660,0.14,0.07); setTimeout(()=>tone(880,0.14,0.05),70); };
const sfxDead  = () => {
  tone(300,0.28,0.07);
  setTimeout(()=>tone(220,0.35,0.06),160);
  setTimeout(()=>tone(165,0.5, 0.04),360);
};

// ── Stars ─────────────────────────────────────────────────────────────────────
const STARS = Array.from({length:72}, ()=>({
  x:Math.random()*W, y:Math.random()*H,
  r:Math.random()*1.4+0.3,
  ph:Math.random()*Math.PI*2,
  sp:Math.random()*0.022+0.008,
}));

// ── Rain streaks ──────────────────────────────────────────────────────────────
const RAIN = Array.from({length:48}, ()=>({
  x:Math.random()*W, y:Math.random()*H,
  len:Math.random()*16+6,
  spd:Math.random()*1.4+0.7,
  op:Math.random()*0.16+0.04,
}));

// ── Progressive difficulty ────────────────────────────────────────────────────
// Fully eased in by score 90. Start: slow, floaty, wide gaps. End: classic feel.
function lerp(a,b,t){ return a+(b-a)*Math.min(1,t); }
function diff() {
  const t = Math.min(1, score / 90);
  return {
    gravity:   lerp(0.15, 0.40, t),
    flapV:     lerp(-5.2, -7.3, t),
    pspeed:    lerp(1.0,  3.0,  t),
    gap:       lerp(240,  128,  t),
    pinterval: Math.round(lerp(145, 90, t)),
  };
}

// ── Cat state ─────────────────────────────────────────────────────────────────
const CAT = {
  x:100, y:H/2, vy:0, angle:0, w:44, h:32,
  reset(){ this.y=H/2; this.vy=0; this.angle=0; },
  flap(fv){ this.vy=fv; sfxFlap(); },
  update(grav){
    this.vy += grav;
    this.y  += this.vy;
    this.angle = Math.max(-0.45, Math.min(1.1, this.vy*0.055));
  },
};

// ── Book-stack pipes ──────────────────────────────────────────────────────────
const BCOLORS = [TEAL,TEAL2,LAV,LAV2,'#6a8c7c','#8a7ab2','#5e8875'];

function makeCluster(n) {
  // 2-3 floating books per cluster
  return Array.from({length: n}, ()=>({
    h: 20+Math.floor(Math.random()*24),
    w: 44+Math.floor(Math.random()*16),
    color: BCOLORS[Math.floor(Math.random()*BCOLORS.length)],
    rot: (Math.random()-0.5)*0.07, // tiny random lean for hand-drawn feel
  }));
}

function makePipe() {
  const d = diff();
  const margin = 95;
  const gapY = d.gap/2 + margin + Math.random()*(H - d.gap - margin*2);
  const n = 2+Math.floor(Math.random()*2); // 2 or 3 books
  return {
    x: W+12, gapY, gap:d.gap, w:56, passed:false,
    top: makeCluster(n),
    bot: makeCluster(n),
  };
}

let pipes=[], ptick=88; // ~64% of starting pinterval so first pipe comes soon
let score=0, best=+(localStorage.getItem('mf_best')||0);
let mode='idle'; // idle | play | dead
let tick=0, deadTimer=0;

// ── Milestone messages ────────────────────────────────────────────────────────
const MILESTONES = [
  '',
  'still floating~',
  'miso is vibing~',
  "the books don't mind~",
  'just drift~',
  'somewhere between awake and asleep~',
  'miso knows the way~',
  'the rain sounds nice~',
  'this apartment is infinite~',
  'even the stars are watching~',
  'one hundred drifts. wow.~',
];
let toast = { text:'', age:0, show:false };
const TOAST_DUR = 210;

// ── Draw: background ──────────────────────────────────────────────────────────
function drawBg() {
  cx.fillStyle = BG;
  cx.fillRect(0,0,W,H);
  // faint lavender glow at top
  const g = cx.createRadialGradient(W/2,0,0,W/2,0,H*0.55);
  g.addColorStop(0,'rgba(155,139,180,0.05)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=g; cx.fillRect(0,0,W,H);
}

function drawStars() {
  STARS.forEach(s=>{
    s.ph+=s.sp;
    const a=(0.2+Math.sin(s.ph)*0.22).toFixed(2);
    cx.fillStyle=`rgba(232,221,208,${a})`;
    cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2); cx.fill();
  });
}

function drawRain(moving) {
  RAIN.forEach(r=>{
    if(moving){
      r.x-=r.spd*0.38; r.y+=r.spd*2.3;
      if(r.y>H+r.len){ r.y=-r.len; r.x=Math.random()*W; }
      if(r.x<-4)     { r.x=W+4;   r.y=Math.random()*H; }
    }
    cx.strokeStyle=`rgba(127,181,160,${r.op})`;
    cx.lineWidth=0.75;
    cx.beginPath();
    cx.moveTo(r.x,r.y);
    cx.lineTo(r.x-r.len*0.24,r.y+r.len);
    cx.stroke();
  });
}

// ── Draw: book stacks ─────────────────────────────────────────────────────────
function rr(x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y);
  cx.lineTo(x+w-r,y); cx.arcTo(x+w,y,   x+w,y+r,  r);
  cx.lineTo(x+w,y+h-r); cx.arcTo(x+w,y+h,x+w-r,y+h,r);
  cx.lineTo(x+r,y+h); cx.arcTo(x,y+h,  x,y+h-r, r);
  cx.lineTo(x,y+r); cx.arcTo(x,y,    x+r,y,   r);
  cx.closePath();
}

function drawBook(bx, by, bw, bh, color, rot) {
  cx.save();
  cx.translate(bx+bw/2, by+bh/2);
  cx.rotate(rot||0);
  // body
  cx.fillStyle = color;
  cx.fillRect(-bw/2,-bh/2, bw, bh);
  // spine (left strip, darker)
  cx.fillStyle = 'rgba(0,0,0,0.22)';
  cx.fillRect(-bw/2,-bh/2, 7, bh);
  cx.fillStyle = 'rgba(255,255,255,0.07)';
  cx.fillRect(-bw/2+1,-bh/2, 1, bh);
  // pages edge (right)
  cx.fillStyle = 'rgba(232,221,208,0.13)';
  cx.fillRect(bw/2-4,-bh/2+1, 3, bh-2);
  // title lines
  cx.fillStyle = 'rgba(255,255,255,0.11)';
  cx.fillRect(-bw/2+10,-bh/2+5, bw-16, 1.5);
  if(bh>24) cx.fillRect(-bw/2+10,-bh/2+11, bw-22, 1);
  // hand-drawn outline
  cx.strokeStyle = 'rgba(0,0,0,0.12)';
  cx.lineWidth = 0.6;
  cx.strokeRect(-bw/2,-bh/2, bw, bh);
  cx.restore();
}

function drawCluster(books, px, pw, anchorY, dir) {
  const sl = books.slice(0,3);
  if(dir==='top'){
    // cluster hangs above gap — bottom edge of stack at anchorY
    const totalH = sl.reduce((s,b)=>s+b.h, 0);
    let ty = anchorY - totalH;
    for(const b of sl){
      drawBook(px+(pw-b.w)/2, ty, b.w, b.h, b.color, b.rot);
      ty += b.h;
    }
    // subtle float shadow below
    cx.fillStyle='rgba(0,0,0,0.09)';
    cx.fillRect(px, anchorY, pw, 4);
  } else {
    // cluster floats above floor — top edge of stack at anchorY
    let ty = anchorY;
    for(const b of sl){
      drawBook(px+(pw-b.w)/2, ty, b.w, b.h, b.color, b.rot);
      ty += b.h;
    }
    // subtle float shadow above
    cx.fillStyle='rgba(0,0,0,0.09)';
    cx.fillRect(px, anchorY-4, pw, 4);
  }
}

function drawPipe(p) {
  const topH = p.gapY - p.gap/2;
  const botY = p.gapY + p.gap/2;
  drawCluster(p.top, p.x, p.w, topH, 'top');
  drawCluster(p.bot, p.x, p.w, botY, 'bot');
}

// ── Draw: Miso — sleepy forward-facing superman pose ─────────────────────────
// Face points toward the player. Paws stretch right (toward obstacles).
// Tail drifts left. Head is forward and visible with half-moon sleepy eyes.
function drawCat(x, y, angle) {
  cx.save();
  cx.translate(x,y);
  cx.rotate(angle);

  // ── tail (trailing left behind body) ──
  cx.strokeStyle=AMB; cx.lineWidth=4.5; cx.lineCap='round';
  cx.beginPath();
  cx.moveTo(-8,5);
  cx.bezierCurveTo(-18,15,-28,5,-24,-11);
  cx.stroke();
  cx.strokeStyle=AMB3; cx.lineWidth=2;
  cx.beginPath();
  cx.moveTo(-8,5);
  cx.bezierCurveTo(-18,15,-28,5,-24,-11);
  cx.stroke();

  // ── body (horizontal oval) ──
  cx.fillStyle=AMB;
  cx.beginPath(); cx.ellipse(3,2,14,9,0,0,Math.PI*2); cx.fill();
  // tabby stripes on body
  cx.save();
  cx.beginPath(); cx.ellipse(3,2,14,9,0,0,Math.PI*2); cx.clip();
  cx.fillStyle=AMB3;
  cx.fillRect(-3,-7, 3.5,20); cx.fillRect(4,-8, 3,22); cx.fillRect(11,-7, 2.5,20);
  cx.fillStyle=AMB2;
  cx.fillRect(-2,-6, 1.5,18); cx.fillRect(5,-7, 1.5,20);
  cx.restore();

  // ── head (faces viewer) ──
  cx.fillStyle=AMB;
  cx.beginPath(); cx.arc(-7,-1,11,0,Math.PI*2); cx.fill();

  // ── ears ──
  cx.fillStyle=AMB;
  cx.beginPath(); cx.moveTo(-15,-9); cx.lineTo(-21,-23); cx.lineTo(-5,-10); cx.closePath(); cx.fill();
  cx.beginPath(); cx.moveTo(-5,-10); cx.lineTo(-1,-23); cx.lineTo( 4,-9);  cx.closePath(); cx.fill();
  cx.fillStyle='#e09080';
  cx.beginPath(); cx.moveTo(-14,-10); cx.lineTo(-18,-19); cx.lineTo(-7,-11); cx.closePath(); cx.fill();
  cx.beginPath(); cx.moveTo(-5,-11);  cx.lineTo(-2,-19);  cx.lineTo( 3,-10); cx.closePath(); cx.fill();

  // ── sleepy half-moon eyes ──
  // dark iris base
  cx.fillStyle='#1a1a2e';
  cx.beginPath(); cx.ellipse(-11,-2,4,3,0,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse( -3,-2,4,3,0,0,Math.PI*2); cx.fill();
  // amber eyelid covers top half → droopy look
  cx.fillStyle=AMB;
  cx.fillRect(-16,-6,10,4.5);
  cx.fillRect( -8,-6,10,4.5);
  // tiny shine
  cx.fillStyle='rgba(255,255,255,0.72)';
  cx.beginPath(); cx.arc(-9.5,-1.5,1.1,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(-1.5,-1.5,1.1,0,Math.PI*2); cx.fill();

  // ── nose ──
  cx.fillStyle='#d08070';
  cx.beginPath(); cx.moveTo(-7,5); cx.lineTo(-10,2); cx.lineTo(-4,2); cx.closePath(); cx.fill();

  // ── drowsy mouth ──
  cx.strokeStyle='rgba(160,100,80,0.5)'; cx.lineWidth=0.8;
  cx.beginPath(); cx.moveTo(-7,5); cx.quadraticCurveTo(-10, 9,-12, 8); cx.stroke();
  cx.beginPath(); cx.moveTo(-7,5); cx.quadraticCurveTo( -4, 9, -2, 8); cx.stroke();

  // ── whiskers ──
  cx.strokeStyle='rgba(232,221,208,0.5)'; cx.lineWidth=0.9;
  cx.beginPath(); cx.moveTo(-11,3); cx.lineTo(-27, 0); cx.stroke();
  cx.beginPath(); cx.moveTo(-11,5); cx.lineTo(-26, 8); cx.stroke();
  cx.beginPath(); cx.moveTo( -3,3); cx.lineTo(  9, 0); cx.stroke();
  cx.beginPath(); cx.moveTo( -3,5); cx.lineTo(  8, 8); cx.stroke();

  // ── front paws (stretched right toward obstacles) ──
  cx.fillStyle=AMB;
  cx.beginPath(); cx.ellipse(20,-7,7,4.5,-0.2,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(20, 8,7,4.5, 0.2,0,Math.PI*2); cx.fill();
  // toe beans
  cx.fillStyle='#e09080';
  cx.beginPath(); cx.arc(25,-9,  1.2,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(25,-6,  1.2,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(25, 6,  1.2,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(25, 9,  1.2,0,Math.PI*2); cx.fill();

  cx.restore();
}

// ── Draw: HUD screens ─────────────────────────────────────────────────────────
function drawScore() {
  cx.fillStyle='rgba(232,221,208,0.88)';
  cx.font='bold 30px Georgia,serif';
  cx.textAlign='center'; cx.textBaseline='top';
  cx.fillText(score, W/2, 22);
}

function drawIdle() {
  cx.textAlign='center'; cx.textBaseline='middle';

  cx.fillStyle=AMB;
  cx.font='italic bold 38px Georgia,serif';
  cx.fillText('miso floats', W/2, H/2-72);

  cx.fillStyle=TEXTD;
  cx.font='15px Georgia,serif';
  cx.fillText("help miso drift through remy's apartment", W/2, H/2-36);

  const pulse=0.5+Math.sin(tick*0.045)*0.42;
  cx.globalAlpha=pulse;
  cx.fillStyle=TEAL;
  cx.font='italic 16px Georgia,serif';
  cx.fillText('tap  ·  or press space', W/2, H/2+32);
  cx.globalAlpha=1;

  if(best>0){
    cx.fillStyle=TEXTD;
    cx.font='13px Georgia,serif';
    cx.fillText(`best: ${best}`, W/2, H/2+66);
  }

  cx.fillStyle='rgba(106,93,80,0.42)';
  cx.font='italic 11px Georgia,serif';
  cx.fillText("it's okay to be you.", W/2, H-22);
}

function drawDead() {
  // dim overlay
  cx.fillStyle='rgba(12,12,24,0.72)';
  cx.fillRect(0,0,W,H);

  // card
  const cw=268, ch=206, cx2=W/2-cw/2, cy2=H/2-ch/2;
  cx.fillStyle=SURF; rr(cx2,cy2,cw,ch,14); cx.fill();
  cx.strokeStyle=LAV; cx.lineWidth=1; rr(cx2,cy2,cw,ch,14); cx.stroke();

  cx.textAlign='center'; cx.textBaseline='middle';

  cx.fillStyle=AMB;
  cx.font='italic bold 23px Georgia,serif';
  cx.fillText('miso dozed off~', W/2, H/2-64);

  cx.fillStyle=TEXT;
  cx.font='16px Georgia,serif';
  cx.fillText(`floated past ${score} stack${score!==1?'s':''}`, W/2, H/2-28);

  if(score>0 && score>=best){
    cx.fillStyle=TEAL;
    cx.font='italic 14px Georgia,serif';
    cx.fillText('new best  ✦', W/2, H/2+2);
  } else if(best>0){
    cx.fillStyle=TEXTD;
    cx.font='13px Georgia,serif';
    cx.fillText(`best: ${best}`, W/2, H/2+4);
  }

  if(deadTimer>42){
    cx.globalAlpha=0.55+Math.sin(tick*0.05)*0.4;
    cx.fillStyle=TEAL;
    cx.font='italic 15px Georgia,serif';
    cx.fillText('tap or space to float again', W/2, H/2+48);
    cx.globalAlpha=1;
  }

  cx.fillStyle=LAV;
  cx.font=`italic ${15+Math.sin(tick*0.04)*2}px Georgia,serif`;
  cx.fillText('z  z  z', W/2, H/2+80);
}

// ── Draw: milestone toast ─────────────────────────────────────────────────────
function drawToast() {
  if(!toast.show) return;
  toast.age++;
  const fade = toast.age < 35      ? toast.age/35 :
               toast.age > TOAST_DUR-35 ? (TOAST_DUR-toast.age)/35 : 1;
  if(fade <= 0){ toast.show=false; return; }
  cx.globalAlpha = fade * 0.82;
  cx.fillStyle   = TEAL;
  cx.font        = 'italic 15px Georgia,serif';
  cx.textAlign   = 'center';
  cx.textBaseline= 'middle';
  cx.fillText(toast.text, W/2, 72);
  cx.globalAlpha = 1;
}

// ── Collision ─────────────────────────────────────────────────────────────────
function hits(p) {
  const pad=5;
  const mx=CAT.x-CAT.w/2+pad, mw=CAT.w-pad*2;
  const my=CAT.y-CAT.h/2+pad, mh=CAT.h-pad*2;
  const topH=p.gapY-p.gap/2, botY=p.gapY+p.gap/2;
  return mx+mw>p.x && mx<p.x+p.w && (my<topH || my+mh>botY);
}

// ── Input ─────────────────────────────────────────────────────────────────────
function doFlap() {
  if(mode==='idle'){
    mode='play'; CAT.flap(diff().flapV);
  } else if(mode==='play'){
    CAT.flap(diff().flapV);
  } else if(mode==='dead' && deadTimer>42){
    score=0; pipes=[]; ptick=88; toast={text:'',age:0,show:false};
    CAT.reset(); mode='play'; CAT.flap(diff().flapV);
  }
}

window.addEventListener('keydown', e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); doFlap(); }
});
cv.addEventListener('pointerdown', e=>{ e.preventDefault(); doFlap(); });

// ── Game loop ─────────────────────────────────────────────────────────────────
function loop() {
  tick++;
  cx.setTransform(sc,0,0,sc,0,0);

  drawBg();
  drawStars();
  drawRain(mode==='play');

  if(mode==='play'){
    const d = diff();
    CAT.update(d.gravity);

    ptick++;
    if(ptick>=d.pinterval){ pipes.push(makePipe()); ptick=0; }

    pipes.forEach(p=>{
      p.x-=d.pspeed;
      if(!p.passed && p.x+p.w<CAT.x){
        p.passed=true; score++;
        if(score>best){ best=score; localStorage.setItem('mf_best',best); }
        sfxScore();
        if(score%10===0){
          const mi = Math.min(score/10, MILESTONES.length-1);
          toast = { text:MILESTONES[mi], age:0, show:true };
        }
      }
    });
    pipes=pipes.filter(p=>p.x+p.w>-12);

    if(CAT.y>H+20 || CAT.y<-20 || pipes.some(hits)){
      mode='dead'; deadTimer=0; sfxDead();
    }
  }

  if(mode==='idle'){
    CAT.y = H/2+10+Math.sin(tick*0.032)*13;
    CAT.angle = Math.sin(tick*0.032)*0.08;
  }

  if(mode==='dead') deadTimer++;

  pipes.forEach(drawPipe);
  drawCat(CAT.x, CAT.y, CAT.angle);

  if(mode==='idle')      drawIdle();
  else if(mode==='play'){ drawScore(); drawToast(); }
  else                   drawDead();

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
